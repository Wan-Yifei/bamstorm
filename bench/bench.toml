# Benchmark configuration for bamstorm vs samtools vs rabbitbam vs pysam.
# Edit this file to control which thread counts are tested.
# 0 is a special value meaning "use all available CPU cores".

[benchmark]
# Unified thread counts applied to all tools unless overridden below.
threads = [1, 2, 4, 8, 0]
# Number of timed repetitions per configuration; the best (fastest) time is reported.
repeats = 3
# Drop OS page cache before each run for cold-cache IO measurement.
# Requires root on Linux; silently skipped otherwise.
drop_cache = true

[fio]
# Set to false to skip disk bandwidth measurement entirely.
enabled = true
# Size of the temporary test file fio creates (e.g. "1g", "4g").
size = "1g"
# How long each fio run lasts (seconds).
runtime = 20
# Number of parallel jobs for the parallel-read test. 0 = all CPU cores.
numjobs_parallel = 0
# Directory for the fio temp file. Defaults to the BAM file's directory.
# tmpdir = "/tmp"

# Per-tool overrides — uncomment to diverge from benchmark.threads.
# [bamstorm]
# threads = [1, 2, 4, 8, 0]

# [samtools]
# threads = [1, 2, 4, 8, 0]

# [rabbitbam]
# threads = [1, 2, 4, 8, 0]

# [pysam]
# threads = [1, 2, 4, 8, 0]
