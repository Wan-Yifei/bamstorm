# Benchmark configuration for bamstrom vs samtools vs rabbitbam vs pysam.
# Edit this file to control which thread counts are tested.
# 0 is a special value meaning "use all available CPU cores".

[benchmark]
# Unified thread counts applied to all tools unless overridden below.
threads = [1, 2, 4, 8, 0]
# Number of timed repetitions per configuration; the best (fastest) time is reported.
repeats = 3
# Drop OS page cache before each run for cold-cache IO measurement.
# Requires root on Linux; silently skipped otherwise.
drop_cache = true

# Per-tool overrides — uncomment to diverge from benchmark.threads.
# [bamstrom]
# threads = [1, 2, 4, 8, 0]

# [samtools]
# threads = [1, 2, 4, 8, 0]

# [rabbitbam]
# threads = [1, 2, 4, 8, 0]

# [pysam]
# threads = [1, 2, 4, 8, 0]
